background           #0f061f
# 深紫色背景，简约且减少视觉干扰
foreground           #e2daf5
# 浅紫色前景，柔和对比
cursor               #c0a0ff
# 亮紫色光标，提高可见性

# 基础色系 (0-7)
color0               #0f061f
# 深紫黑（背景色延伸）
color1               #ff6b9c
# 紫红色（用于错误提示）
color2               #a97cff
# 薰衣草紫（替代传统绿色）
color3               #d4a8ff
# 浅紫（替代传统黄色）
color4               #8a7fff
# 蓝紫色（链接/关键字）
color5               #d18aff
# 亮紫（突出显示）
color6               #7bc1ff
# 紫调蓝（注释/次要信息）
color7               #d0c5e8
# 灰紫色（文本）

# 明亮色系 (8-15)
color8               #2a1a40
# 暗紫色（非活动元素）
color9               #ff8cb4
# 粉紫色（错误高亮）
color10              #c6a6ff
# 柔薰衣草紫（成功提示）
color11              #e8c5ff
# 淡紫（警告高亮）
color12              #a69cff
# 浅蓝紫（活动链接）
color13              #e0a5ff
# 荧光紫（重要元素）
color14              #9cd4ff
# 紫调青（高亮信息）
color15              #f0eafc
# 淡紫白（强对比文本）

# 选择高亮
selection_foreground #0f061f
# 深紫黑（保证可读性）
selection_background #c6a6ff
# 柔薰衣草紫（视觉舒适）
